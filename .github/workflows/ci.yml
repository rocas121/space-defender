name: CI - Space Defender
 
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
 
jobs:
  test:
    name: Build & Tests NUnit
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h   # affiche l'espace dispo pour vÈrifier
          
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          lfs: true
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-
 
      - name: Run Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: EditMode
          artifactsPath: test-results/
          coverageOptions: generateAdditionalMetrics;generateHtmlReport
 
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
 
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CodeCoverage/
          retention-days: 14
  build:
    name: Build WebGL
    needs: test             # attend que les tests passent
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
 
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          lfs: true
          path: Library
          key: Library-${{ hashFiles('Assets/**') }}
 
      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: SpaceDefender
 
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL/
          retention-days: 30
